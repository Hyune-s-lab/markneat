name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to build and update
        required: true
        type: string

permissions:
  contents: write

jobs:
  attach-plugin-distribution:
    name: Build and attach plugin ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${RELEASE_TAG:-$INPUT_TAG}"
          test -n "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out release
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify release
        run: ./gradlew verifyRelease

      - name: Attach plugin distribution
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" build/distributions/*.zip --clobber
